<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x0s | Arattai Module</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #007aff;
            --card: #0a0a0a;
            --border: #1a1a1a;
            --font-main: 'Space Grotesk', sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Slide-up Transition */
        .container {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Glassmorphism Card */
        .module-card {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 2rem;
            width: 280px;
            text-align: center;
            transition: transform 0.2s ease, border-color 0.3s ease;
            cursor: pointer;
        }

        /* Scale-down Active State */
        .module-card:active {
            transform: scale(0.94);
        }

        .module-card:hover {
            border-color: var(--accent);
        }

        /* Developer Badge (8px, tracked out) */
        .dev-badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--accent);
            margin-bottom: 2rem;
            display: block;
            opacity: 0.7;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box img {
            width: 100%;
            height: 100%;
            /* Filter to ensure it matches the accent blue if needed */
            filter: drop-shadow(0 0 10px rgba(0, 122, 255, 0.2));
        }

        h2 {
            font-weight: 500;
            font-size: 1.25rem;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .sub-text {
            font-size: 11px;
            opacity: 0.4;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="module-card">
            <span class="dev-badge">x0s_core / node_01</span>
            
            <div class="icon-box">
                <img src="file.svg" alt="Arattai Icon">
            </div>

            <h2>Arattai</h2>
            <div class="sub-text">Encrypted_Network</div>
        </div>
    </div>

</body>
</html>
